spring:
  application:
    name: hotel-pricing-add
  ai:
    dashscope:
      enabled: ${SPRING_AI_DASHSCOPE_ENABLED:false}
      api-key: ${AI_DASHSCOPE_API_KEY:${DASHSCOPE_API_KEY:}}
      base-url: ${AI_DASHSCOPE_BASE_URL:${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}}
      chat:
        options:
          model: ${APP_QWEN_MODEL:qwen3-max}
          temperature: 0.2
          top-p: 0.8

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  assignment-name: "Software Architecture (2026) Assignment 2"
  paradigm: "C: Multi-agent"
  llm-name: "Qwen3-Max"
  output-language: "English"
  artifact-root: "./artifacts"
  default-diagram-type: "mermaid"
  reviewer-rounds: 1
